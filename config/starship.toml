\n$character"""

[directory]
style = "bg:#1e3140 fg:#addb67"
format = "[ ůįČč $path ]($style)"
truncation_length = 3

[git_branch]
symbol = "Ôźė"
style = "bg:#2d4252 fg:#82aaff"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "bg:#2d4252 fg:#ef5350"
format = '([$all_status$ahead_behind]($style))'

[time]
disabled = false
time_format = "%R"
style = "bg:#011627 fg:#ecc48d"
format = '[ ůĪĎí $time ]($style)'

[docker_context]
symbol = "ÔĆą "
style = "bg:#82aaff fg:#011627"
format = '[ $symbol ]($style)'

[character]
success_symbol = "[‚ö°](bold #addb67)"
error_symbol = "[‚úĖ](bold #ef5350)"
