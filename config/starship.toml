# ~/.config/starship.toml

format = """
[‚ĖĎ‚Ėí‚Ėď](#011627)\
[ ůį£á ](bg:#011627 fg:#82aaff)\
[Óāį](fg:#011627 bg:#1e3140)\
$directory\
[Óāį](fg:#1e3140 bg:#2d4252)\
