[window]
padding = { x = 12, y = 12 }
opacity = 0.95
blur = true
decorations = "None"
startup_mode = "Maximized"

[font]
normal = { family = "JetBrainsMono Nerd Font", style = "Regular" }
size = 11.0

[terminal]
shell = "/usr/bin/zsh"

# --- ESQUEMA DE COLORES: NIGHT OWL ---
[colors.primary]
background = '#011627'
foreground = '#d6deeb'

[colors.normal]
black   = '#011627'
red     = '#ef5350'
green   = '#22da6e'
yellow  = '#addb67'
blue    = '#82aaff'
magenta = '#c792ea'
cyan    = '#21c7a8'
white   = '#ffffff'

[colors.bright]
black   = '#575656'
red     = '#ef5350'
green   = '#22da6e'
yellow  = '#addb67'
blue    = '#82aaff'
magenta = '#c792ea'
cyan    = '#7fdbca'
white   = '#ffffff'

[keyboard]
bindings = [
    { key = "Equals", mods = "Control", action = "IncreaseFontSize" },
    { key = "Plus", mods = "Control|Shift", action = "IncreaseFontSize" },
    { key = "Minus", mods = "Control", action = "DecreaseFontSize" },
    { key = "Key0", mods = "Control", action = "ResetFontSize" } # Corregido a Key0
]
